name: Deploy to Pi

on:
  push:
    branches: [master]
    paths:
      - "bot.py"
      - "scraper.py"
      - "apply.py"
      - "console.py"
      - "cli.py"
      - "requirements.txt"
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 100.104.33.84
          username: antonio
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # The Pi's authorized_keys pins this key to one forced command
          # (git pull --ff-only && restart the services) regardless of what's
          # sent here, so this is just a label for the SSH session.
          script: echo "deploy (actual command is forced server-side)"
